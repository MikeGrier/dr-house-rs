name: Build Extension

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x64
            node-arch: x64
          - os: windows-latest
            target: arm64
            node-arch: arm64
          - os: ubuntu-latest
            target: linux-x64
            node-arch: x64
          - os: macos-latest
            target: darwin-x64
            node-arch: x64
          - os: macos-latest
            target: darwin-arm64
            node-arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          architecture: ${{ matrix.node-arch }}

      - name: Download TTD debuggers (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\.github\scripts\download-ttd.ps1

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npx vsce package --target ${{ matrix.target }}

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: dr-house-ttd-${{ matrix.target }}
          path: "*.vsix"
