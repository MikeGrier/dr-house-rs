name: 'Read Workspace Version'
description: 'Reads the version from the workspace Cargo.toml'
outputs:
  version:
    description: 'The workspace version'
    value: ${{ steps.version.outputs.version }}
runs:
  using: 'composite'
  steps:
    - name: Read version
      id: version
      shell: bash
      run: |
        VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
